  # ─────────────────────────────────────────────────────────────────────────────
  /personal/relationships/request:
    post:
      tags: [personal-relationships]
      operationId: RelationshipsController_createRequest
      summary: Create relationship request
      description: Rate limited to 10 requests per 60 seconds
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRelationshipRequestDto'
      responses:
        '201':
          description: Request created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RelationshipResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /personal/relationships/respond:
    post:
      tags: [personal-relationships]
      operationId: RelationshipsController_respond
      summary: Respond to pending relationship request
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RespondRelationshipRequestDto'
      responses:
        '200':
          description: Response recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RelationshipResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /personal/relationships/cancel:
    patch:
      tags: [personal-relationships]
      operationId: RelationshipsController_cancelRequest
