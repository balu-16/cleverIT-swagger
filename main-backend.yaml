      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BlockRelationshipDto'
      responses:
        '200':
          description: Request cancelled
        '401':
          $ref: '#/components/responses/Unauthorized'

  /personal/relationships/remove:
    patch:
      tags: [personal-relationships]
      operationId: RelationshipsController_removeRelationship
      summary: Remove accepted relationship
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BlockRelationshipDto'
      responses:
        '200':
          description: Relationship removed
        '401':
          $ref: '#/components/responses/Unauthorized'

  /personal/relationships/block:
    patch:
      tags: [personal-relationships]
      operationId: RelationshipsController_block
      summary: Block relationship
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BlockRelationshipDto'
      responses:
        '200':
          description: Relationship blocked
        '401':
          $ref: '#/components/responses/Unauthorized'

  /personal/relationships/unblock:
    patch:
      tags: [personal-relationships]
      operationId: RelationshipsController_unblock
      summary: Unblock relationship
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BlockRelationshipDto'
      responses:
        '200':
          description: Relationship unblocked
        '401':
          $ref: '#/components/responses/Unauthorized'

  /personal/relationships/tag:
    patch:
      tags: [personal-relationships]
      operationId: RelationshipsController_updateTag
      summary: Update relationship tag
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRelationshipTagDto'
      responses:
        '200':
          description: Tag updated
        '401':
          $ref: '#/components/responses/Unauthorized'

  /personal/relationships/note:
    patch:
      tags: [personal-relationships]
      operationId: RelationshipsController_upsertNote
      summary: Upsert private note for relationship
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RelationshipNoteDto'
      responses:
        '200':
          description: Note saved
        '401':
          $ref: '#/components/responses/Unauthorized'

  /personal/relationships/mine:
    get:
      tags: [personal-relationships]
      operationId: RelationshipsController_listMine
      summary: List my relationships
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Relationships list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RelationshipResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /personal/relationships/search-users:
    get:
      tags: [personal-relationships]
      operationId: RelationshipsController_searchUsers
      summary: Search discoverable users for relationship requests
      security:
        - bearerAuth: []
      parameters:
        - name: q
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserSearchResult'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /personal/relationships/lookup-phone:
    post:
      tags: [personal-relationships]
      operationId: RelationshipsController_lookupByPhone
      summary: Phone-based exact lookup with visibility enforcement
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PhoneLookupDto'
      responses:
        '200':
          description: Lookup result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSearchResult'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /personal/relationships/eligibility:
    get:
      tags: [personal-relationships]
      operationId: RelationshipsController_checkEligibility
      summary: Check if a target user is eligible for group membership
      description: Returns eligibility status based on accepted relationship. Used by chat-backend for group member validation.
      security:
        - bearerAuth: []
      parameters:
        - name: targetUserId
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Eligibility status
          content:
            application/json:
              schema:
                type: object
                properties:
                  eligible:
                    type: boolean
                  reason:
                    type: string
        '401':
          $ref: '#/components/responses/Unauthorized'

  /personal/relationships/eligibility/bulk:
    post:
      tags: [personal-relationships]
      operationId: RelationshipsController_bulkCheckEligibility
      summary: Bulk check eligibility for multiple target users
      description: Returns eligibility status for up to 50 target users. Rate limited to 20 requests per 60 seconds.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkCheckEligibilityDto'
      responses:
        '200':
          description: Eligibility results
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: object
                  properties:
                    eligible:
                      type: boolean
                    reason:
                      type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token from auth/verify-otp or auth/signup

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    TooManyRequests:
      description: Too many requests
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    ErrorResponse:
      type: object
      properties:
        statusCode:
          type: integer
          example: 400
        message:
          type: string
          example: Bad Request
        error:
          type: string
          example: Validation failed

    SendOtpDto:
      type: object
      required:
        - phone
      properties:
        phone:
          type: string
          description: Phone number in E.164 format
          example: '+919876543210'

    SendOtpResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string

    VerifyOtpDto:
      type: object
      required:
        - phone
        - otp
      properties:
        phone:
          type: string
          example: '+919876543210'
        otp:
          type: string
          example: '123456'

    SignupDto:
      type: object
      required:
        - phone
        - otp
        - fullName
      properties:
        phone:
          type: string
          example: '+919876543210'
        otp:
          type: string
          example: '123456'
        fullName:
          type: string
          example: John Doe
        email:
          type: string
          format: email

    AuthResponse:
      type: object
      properties:
        access_token:
          type: string
        user:
          $ref: '#/components/schemas/UserProfile'

    UserProfile:
      type: object
      properties:
        id:
          type: string
        uuid:
          type: string
          format: uuid
        phone:
          type: string
        fullName:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [user, business_user, business_admin, super_admin]
        mode:
          type: string
          enum: [personal, business, system]
        businessId:
          type: string
          nullable: true
        isActive:
          type: boolean
        accountStatus:
          type: string
          enum: [active, inactive, deleted]
        profileImage:
          type: object
          properties:
            url:
              type: string
              nullable: true
            updatedAt:
              type: string
              format: date-time
              nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    UpdateUserDto:
      type: object
      properties:
        fullName:
          type: string
        email:
          type: string
          format: email
        bio:
          type: string

    UserPreferences:
      type: object
      properties:
        theme:
          type: string
        notifications:
          type: object
        privacy:
          type: object

    UpdateUserPreferencesDto:
      type: object
      properties:
        theme:
          type: string
        notifications:
          type: object
        privacy:
          type: object

    PaginatedUserList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/UserProfile'
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    ActivitySummary:
      type: object
      properties:
        totalLogins:
          type: integer
        lastLogin:
          type: string
          format: date-time
        appointmentsCount:
          type: integer

    PaginatedLoginLogs:
      type: object
      properties:
        items:
          type: array
          items:
            type: object
            properties:
              timestamp:
                type: string
                format: date-time
              ipAddress:
                type: string
              userAgent:
                type: string
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    AggregatedSchedules:
      type: object
      properties:
        calendarEvents:
          type: array
          items:
            type: object
        appointments:
          type: array
          items:
            type: object
        total:
          type: integer

    BusinessProfile:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        category:
          type: string
        address:
          type: object

    BusinessService:
      type: object
      properties:
        publicId:
          type: string
        name:
          type: string
        description:
          type: string
        price:
          type: number
        duration:
          type: integer
        isActive:
          type: boolean

    CreateRelationshipRequestDto:
      type: object
      required:
        - targetUserId
      properties:
        targetUserId:
          type: string
        message:
          type: string

    RespondRelationshipRequestDto:
      type: object
      required:
        - requestId
        - action
      properties:
        requestId:
          type: string
        action:
          type: string
          enum: [accept, reject]

    BlockRelationshipDto:
      type: object
      required:
        - targetUserId
      properties:
        targetUserId:
          type: string

    UpdateRelationshipTagDto:
      type: object
      required:
        - targetUserId
        - tag
      properties:
        targetUserId:
          type: string
        tag:
          type: string

    RelationshipNoteDto:
      type: object
      required:
        - targetUserId
        - note
      properties:
        targetUserId:
          type: string
        note:
          type: string

    PhoneLookupDto:
      type: object
      required:
        - phone
      properties:
        phone:
          type: string

    BulkCheckEligibilityDto:
      type: object
      required:
        - targetUserIds
      properties:
        targetUserIds:
          type: array
          items:
            type: string
          maxItems: 50

    RelationshipResponse:
      type: object
      properties:
        id:
          type: string
        status:
          type: string
          enum: [pending, accepted, rejected, blocked, removed]
        initiatorId:
          type: string
        targetId:
          type: string
        tag:
          type: string
        note:
          type: string
        createdAt:
          type: string
          format: date-time

    UserSearchResult:
      type: object
      properties:
        id:
          type: string
        uuid:
          type: string
        fullName:
          type: string
        profileImageUrl:
          type: string
          nullable: true
        relationshipStatus:
          type: string
          nullable: true
