        - bearerAuth: []
      responses:
        '200':
          description: Moderation state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModerationState'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /personal/moderation/shadow-ban:
    patch:
      tags: [personal-moderation]
      operationId: ModerationController_shadowBan
      summary: Admin-only shadow-ban toggle
      description: Requires super_admin role
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - targetUserId
                - enabled
              properties:
                targetUserId:
                  type: string
                enabled:
                  type: boolean
                reason:
                  type: string
      responses:
        '200':
          description: Shadow-ban toggled
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  # ─────────────────────────────────────────────────────────────────────────────
  # QR Code Identity
  # ─────────────────────────────────────────────────────────────────────────────
  /qr/me:
    get:
      tags: [qr]
      operationId: QrController_getMyQr
      summary: Get own QR token and public profile preview
      security:
        - bearerAuth: []
      responses:
        '200':
          description: QR token and profile preview
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QrTokenResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /qr/resolve/{token}:
    get:
      tags: [qr]
      operationId: QrController_resolveQr
      summary: Resolve QR token to public user profile
      description: Rate limited to 20 requests per 60 seconds
      security:
        - bearerAuth: []
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Resolved profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicProfile'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token from auth/verify-otp or auth/signup

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    TooManyRequests:
      description: Too many requests
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    ErrorResponse:
      type: object
      properties:
        statusCode:
          type: integer
          example: 400
        message:
          type: string
          example: Bad Request
        error:
          type: string
          example: Validation failed

    SendOtpDto:
      type: object
      required:
        - phone
      properties:
        phone:
          type: string
          description: Phone number in E.164 format
          example: '+919876543210'

    SendOtpResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string

    VerifyOtpDto:
      type: object
      required:
        - phone
        - otp
      properties:
        phone:
          type: string
          example: '+919876543210'
        otp:
          type: string
          example: '123456'

    SignupDto:
      type: object
      required:
        - phone
        - otp
        - fullName
      properties:
        phone:
          type: string
          example: '+919876543210'
        otp:
          type: string
          example: '123456'
        fullName:
          type: string
          example: John Doe
        email:
          type: string
          format: email

    AuthResponse:
      type: object
      properties:
        access_token:
          type: string
        user:
          $ref: '#/components/schemas/UserProfile'

    UserProfile:
      type: object
      properties:
        id:
          type: string
        uuid:
          type: string
          format: uuid
        phone:
          type: string
        fullName:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [user, business_user, business_admin, super_admin]
        mode:
          type: string
          enum: [personal, business, system]
        businessId:
          type: string
          nullable: true
        isActive:
          type: boolean
        accountStatus:
          type: string
          enum: [active, inactive, deleted]
        profileImage:
          type: object
          properties:
            url:
              type: string
              nullable: true
            updatedAt:
              type: string
              format: date-time
              nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    UpdateUserDto:
      type: object
      properties:
        fullName:
          type: string
        email:
          type: string
          format: email
        bio:
          type: string

    UserPreferences:
      type: object
      properties:
        theme:
          type: string
        notifications:
          type: object
        privacy:
          type: object

    UpdateUserPreferencesDto:
      type: object
      properties:
        theme:
          type: string
        notifications:
          type: object
        privacy:
          type: object

    PaginatedUserList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/UserProfile'
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    ActivitySummary:
      type: object
      properties:
        totalLogins:
          type: integer
        lastLogin:
          type: string
          format: date-time
        appointmentsCount:
          type: integer

    PaginatedLoginLogs:
      type: object
      properties:
        items:
          type: array
          items:
            type: object
            properties:
              timestamp:
                type: string
                format: date-time
              ipAddress:
                type: string
              userAgent:
                type: string
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    AggregatedSchedules:
      type: object
      properties:
        calendarEvents:
          type: array
          items:
            type: object
        appointments:
          type: array
          items:
            type: object
        total:
          type: integer

    BusinessProfile:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        category:
          type: string
        address:
          type: object

    BusinessService:
      type: object
      properties:
        publicId:
          type: string
        name:
          type: string
        description:
          type: string
        price:
          type: number
        duration:
          type: integer
        isActive:
          type: boolean

    CreateRelationshipRequestDto:
      type: object
      required:
        - targetUserId
      properties:
        targetUserId:
          type: string
        message:
          type: string

    RespondRelationshipRequestDto:
      type: object
      required:
        - requestId
        - action
      properties:
        requestId:
          type: string
        action:
          type: string
          enum: [accept, reject]

    BlockRelationshipDto:
      type: object
      required:
        - targetUserId
      properties:
        targetUserId:
          type: string

    UpdateRelationshipTagDto:
      type: object
      required:
        - targetUserId
        - tag
      properties:
        targetUserId:
          type: string
        tag:
          type: string

    RelationshipNoteDto:
      type: object
      required:
        - targetUserId
        - note
      properties:
        targetUserId:
          type: string
        note:
          type: string

    PhoneLookupDto:
      type: object
      required:
        - phone
      properties:
        phone:
          type: string

    BulkCheckEligibilityDto:
      type: object
      required:
        - targetUserIds
      properties:
        targetUserIds:
          type: array
          items:
            type: string
          maxItems: 50

    RelationshipResponse:
      type: object
      properties:
        id:
          type: string
        status:
          type: string
          enum: [pending, accepted, rejected, blocked, removed]
        initiatorId:
          type: string
        targetId:
          type: string
        tag:
          type: string
        note:
          type: string
        createdAt:
          type: string
          format: date-time

    UserSearchResult:
      type: object
      properties:
        id:
          type: string
        uuid:
          type: string
        fullName:
          type: string
        profileImageUrl:
          type: string
          nullable: true
        relationshipStatus:
          type: string
          nullable: true

    CallerIdResult:
      type: object
      properties:
        phone:
          type: string
        displayName:
          type: string
          nullable: true
        found:
          type: boolean

    BatchResolveDto:
      type: object
      required:
        - phones
      properties:
        phones:
          type: array
          items:
            type: string
          maxItems: 50

    PublicProfile:
      type: object
      properties:
        id:
          type: string
        fullName:
          type: string
        profileImageUrl:
          type: string
          nullable: true
        bio:
          type: string
          nullable: true

    UploadContactsDto:
      type: object
      required:
        - contacts
      properties:
        contacts:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              phone:
                type: string

    GrantConsentDto:
      type: object
      required:
        - consentType
      properties:
        consentType:
          type: string
          enum: [contact_sharing, caller_id]

    RevokeConsentDto:
      type: object
      required:
        - consentType
      properties:
        consentType:
          type: string
          enum: [contact_sharing, caller_id]

    ConsentStatus:
      type: object
      properties:
        contactSharing:
          type: boolean
        callerId:
          type: boolean
        grantedAt:
          type: string
          format: date-time
          nullable: true

    CreatePersonalEventDto:
      type: object
      required:
        - title
        - startTime
      properties:
        title:
          type: string
        description:
          type: string
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        isAllDay:
          type: boolean
        recurrence:
          type: object
          properties:
            frequency:
              type: string
              enum: [daily, weekly, monthly, yearly]
            interval:
              type: integer
            endDate:
              type: string
              format: date
        invitees:
          type: array
          items:
            type: string

    PersonalEvent:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        isAllDay:
          type: boolean
        ownerId:
          type: string
        rsvpStatus:
          type: string
          enum: [pending, accepted, declined, maybe]
        createdAt:
          type: string
          format: date-time

    RespondRsvpDto:
      type: object
      required:
        - response
      properties:
        response:
          type: string
          enum: [accepted, declined, maybe]

    ScheduleReminderDto:
      type: object
      required:
        - reminderTime
      properties:
        reminderTime:
          type: string
          format: date-time

    CancelOccurrenceDto:
      type: object
      required:
        - occurrenceDate
      properties:
        occurrenceDate:
          type: string
          format: date

    UpdateAvailabilityDto:
      type: object
      properties:
        status:
          type: string
          enum: [available, busy, away, dnd]
        statusMessage:
          type: string
        expiresAt:
          type: string
          format: date-time

    CommunicationAvailability:
      type: object
      properties:
        userId:
          type: string
        status:
          type: string
          enum: [available, busy, away, dnd, offline]
        statusMessage:
          type: string
          nullable: true
        lastSeen:
          type: string
          format: date-time
          nullable: true

    LogMissedInteractionDto:
      type: object
      required:
        - targetUserId
        - type
      properties:
        targetUserId:
          type: string
        type:
          type: string
          enum: [call, message]
        timestamp:
          type: string
          format: date-time

    StartPersonalCallDto:
      type: object
      required:
        - targetUserId
      properties:
        targetUserId:
          type: string
        callType:
          type: string
          enum: [voice, video]

    EndPersonalCallDto:
      type: object
      required:
        - callId
      properties:
        callId:
          type: string
        duration:
          type: integer
          description: Call duration in seconds
        endReason:
          type: string
          enum: [completed, missed, declined, failed]

    PersonalProfile:
      type: object
      properties:
        id:
          type: string
        uuid:
          type: string
        fullName:
          type: string
        phone:
          type: string
        email:
          type: string
        bio:
          type: string
        profileImageUrl:
          type: string
          nullable: true
        bloodGroup:
          type: string
          nullable: true
        emergencyContacts:
          type: array
          items:
            type: object

    UpdatePersonalProfileDto:
      type: object
      properties:
        fullName:
          type: string
        bio:
          type: string
        bloodGroup:
          type: string
        emergencyContacts:
          type: array
          items:
            type: object

    BlockUserDto:
      type: object
      required:
        - targetUserId
      properties:
        targetUserId:
          type: string
        reason:
          type: string

    UnblockUserDto:
      type: object
      required:
        - targetUserId
      properties:
        targetUserId:
          type: string

    ReportUserDto:
      type: object
      required:
        - targetUserId
        - reason
      properties:
        targetUserId:
          type: string
        reason:
          type: string
          enum: [spam, harassment, inappropriate_content, impersonation, other]
        details:
          type: string

    ModerationState:
      type: object
      properties:
        blockedUsers:
          type: array
          items:
            type: string
        blockedByCount:
          type: integer
        isShadowBanned:
          type: boolean
        reportCount:
          type: integer

    QrTokenResponse:
      type: object
      properties:
        token:
          type: string
        expiresAt:
          type: string
          format: date-time
        profile:
          $ref: '#/components/schemas/PublicProfile'
